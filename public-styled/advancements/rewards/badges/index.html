}

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-auth.js";
    import { getFirestore, doc, getDoc, onSnapshot, runTransaction, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyD5qUHa2JuQ3iI7U3DrX7JDyhx76PGzhxM",
      authDomain: "troop-248.firebaseapp.com",
      projectId: "troop-248",
      storageBucket: "troop-248.firebasestorage.app",
      messagingSenderId: "925363875752",
      appId: "1:925363875752:web:0b001c1a7a09fb8232f79d",
      measurementId: "G-NY75GX5TBH"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const authInfoEl = document.getElementById("auth-info");
    const logoutBtn = document.getElementById("logout-btn");
    const roleBadgeContainer = document.getElementById("role-badge-container");

    const goldValue = document.getElementById("goldValue");
    const gemsValue = document.getElementById("gemsValue");
    const rankValue = document.getElementById("rankValue");

    const rankPillText = document.getElementById("rankPillText");
    const unlockedNote = document.getElementById("unlockedNote");
    const badgeGrid = document.getElementById("badgeGrid");
    const toast = document.getElementById("toast");

    logoutBtn.addEventListener("click", async () => {
      await signOut(auth);
      window.location.href = "/";
    });

    function showToast(msg){
      toast.textContent = msg;
      toast.classList.add("show");
      clearTimeout(showToast._t);
      showToast._t = setTimeout(()=>toast.classList.remove("show"), 2200);
    }

    function formatNum(n){ return Number(n || 0).toLocaleString("en-US"); }

    function rewardsRef(uid){
      return doc(db, "accountInfo", uid, "modules", "rewards");
    }

    const RARITY = {
      Common:   { cls: "rar-common"   },
      Uncommon: { cls: "rar-uncommon" },
      Rare:     { cls: "rar-rare"     },
      Epic:     { cls: "rar-epic"     },
      Legendary:{ cls: "rar-legend"   }
    };

    const BADGES = [
      { id: "A", name: "Skibidi Scout", rarity: "Common" },
      { id: "B", name: "Peek-A-Chu", rarity: "Common" },
      { id: "C", name: "Will Byers", rarity: "Common" },
      { id: "D", name: "19 dolla Fortnite Card", rarity: "Common" },
      { id: "E", name: "CLANKER", rarity: "Common" },

      { id: "F", name: "Green Thumb", rarity: "Uncommon" },
      { id: "G", name: "Elite Barbarians", rarity: "Uncommon" },
      { id: "H", name: "Kai Cenat", rarity: "Uncommon" },
      { id: "I", name: "67", rarity: "Uncommon" },
      { id: "J", name: "Chudmaxxing", rarity: "Uncommon" },

      { id: "K", name: "Master Chef", rarity: "Rare" },
      { id: "L", name: "Willie's Wee-nee Wagon", rarity: "Rare" },
      { id: "M", name: "TTTSAHUR", rarity: "Rare" },
      { id: "N", name: "1 Pound Fish", rarity: "Rare" },
      { id: "O", name: "Camp Rainey Mountain", rarity: "Rare" },

      { id: "P", name: "Ian's Hot Dog", rarity: "Epic" },
      { id: "Q", name: "Golden Wind)", rarity: "Epic" },
      { id: "R", name: "PLEASE SPEED I NEED THIS", rarity: "Epic" },
      { id: "S", name: "Water Bottle and Me", rarity: "Epic" },
      { id: "T", name: "Patrick's Hub", rarity: "Epic" },

      { id: "U", name: "Lord of the Fries", rarity: "Legendary" },
      { id: "V", name: "BETA BLOCKZ", rarity: "Legendary" },
      { id: "W", name: "Mega Knight", rarity: "Legendary" },
      { id: "X", name: "Apple Fishing Pro", rarity: "Legendary" },
      { id: "Y", name: "Brady Hanrahan", rarity: "Legendary"}
];        
      

    const RANK_ORDER = ["No Rank", "Scout", "Tenderfoot", "2nd Class", "1st Class", "Star", "Life", "Eagle"];

    function unlockedByRank(rank){
      const r = (rank && RANK_ORDER.includes(rank)) ? rank : "No Rank";
      const set = new Set();
      ["A","B","C","D","E"].forEach(x => set.add(x));
      if (r === "No Rank") return set;

      if (r === "Scout") { ["F","G","H"].forEach(x => set.add(x)); return set; }

      if (r === "Tenderfoot") {
        ["F","G","H","I","J"].forEach(x => set.add(x));
        ["K","L"].forEach(x => set.add(x));
        return set;
      }

      if (r === "2nd Class") {
        ["F","G","H","I","J"].forEach(x => set.add(x));
        ["K","L","M","N","O"].forEach(x => set.add(x));
        set.add("P");
        return set;
      }

      BADGES.forEach(b => set.add(b.id));
      return set;
    }

    // Total-points thresholds to reach each target level (2..8)
    const THRESHOLDS = {
      Common:    {2:400, 3:900, 4:1700, 5:3000, 6:5000, 7:8000, 8:13000},
      Uncommon:  {2:240, 3:550, 4:1040, 5:1800,  6:3000, 7:4800, 8:7800},
      Rare:      {2:120,  3:280, 4:540, 5:960,  6:1640,  7:2700, 8:4400},
      Epic:      {2:18,   3:40,  4:76,  5:136,   6:226,  7:370,  8:600},
      Legendary: {2:10,   3:24,  4:44,  5:76,   6:120,   7:180,   8:260},
    };

    // Gold cost to upgrade from L -> L+1 (same for all rarities)
    const UPGRADE_COST = {
      1: 2000,
      2: 6000,
      3: 18000,
      4: 54000,
      5: 162000,
      6: 486000,
      7: 2000000, // L7 -> L8
    };

    function getNextThreshold(rarity, level){
      const next = level + 1;
      if (level >= 8) return null;
      return THRESHOLDS[rarity]?.[next] ?? null;
    }

    function getUpgradeCost(level){
      return UPGRADE_COST[level] ?? null;
    }

    function getLevelMapValue(map, key, fallback){
      const v = map?.[key];
      if (v === undefined || v === null) return fallback;
      const n = Number(v);
      return Number.isFinite(n) ? n : fallback;
    }

    async function upgradeBadge(uid, badgeId, rarity){
      const ref = rewardsRef(uid);

      try{
        await runTransaction(db, async (tx) => {
          const snap = await tx.get(ref);

          // If doc doesn't exist, create a minimal one so the UI won't brick.
          if (!snap.exists()){
            tx.set(ref, {
              gold: 0,
              gems: 0,
              rank: "No Rank",
              chests: { lucky: 0, gold: 0, levelUp: { scout:0, tenderfoot:0, "2class":0, "1class":0, star:0, life:0, eagle:0 } },
              badgesPoints: {},
              badgesLevel: {},
              history: [],
              createdAt: serverTimestamp()
            });
            throw new Error("Rewards data was missing. Created it—refresh and try again.");
          }

          const d = snap.data() || {};
          const gold = Number(d.gold || 0);
          const pointsMap = d.badgesPoints || {};
          const levelMap = d.badgesLevel || {};

          const curLevel = getLevelMapValue(levelMap, badgeId, 1);
          if (curLevel >= 8) throw new Error("This badge is already max level.");

          const nextThreshold = getNextThreshold(rarity, curLevel);
          const cost = getUpgradeCost(curLevel);
          if (nextThreshold == null || cost == null) throw new Error("Upgrade config error.");

          const totalPts = getLevelMapValue(pointsMap, badgeId, 0);

          if (totalPts < nextThreshold) {
            throw new Error(`Not enough points. Need ${formatNum(nextThreshold)} total.`);
          }
          if (gold < cost) {
            throw new Error(`Not enough gold. Need ${formatNum(cost)} gold.`);
          }

          const nextLevelMap = { ...levelMap, [badgeId]: curLevel + 1 };

          const history = Array.isArray(d.history) ? d.history.slice(0, 60) : [];
          history.unshift({
            type: "badgeUpgrade",
            badge: badgeId,
            rarity,
            fromLevel: curLevel,
            toLevel: curLevel + 1,
            costGold: cost,
            at: new Date().toISOString()
          });

          tx.update(ref, {
            gold: gold - cost,
            badgesLevel: nextLevelMap,
            history,
            lastBadgeUpgrade: serverTimestamp()
          });
        });

        showToast(`Upgraded Badge ${badgeId}!`);
      }catch(e){
        showToast(e.message || "Upgrade failed.");
      }
    }

    function renderBadges(rewards, unlockedSet){
      const pointsMap = rewards.badgesPoints || {};
      const levelMap = rewards.badgesLevel || {};
      const gold = Number(rewards.gold || 0);

      badgeGrid.innerHTML = "";

      BADGES.forEach(b => {
        const unlocked = unlockedSet.has(b.id);
        const rarityCls = RARITY[b.rarity]?.cls || "rar-common";

        const totalPts = getLevelMapValue(pointsMap, b.id, 0);
        const level = Math.max(1, Math.min(8, getLevelMapValue(levelMap, b.id, 1)));

        const nextTh = getNextThreshold(b.rarity, level);
        const cost = getUpgradeCost(level);

        const eligibleByPoints = (level < 8) && (nextTh != null) && (totalPts >= nextTh);
        const eligibleByGold = (level < 8) && (cost != null) && (gold >= cost);
        const eligible = unlocked && eligibleByPoints && eligibleByGold;

        const pct = (level >= 8 || !nextTh) ? 100 : Math.max(0, Math.min(100, Math.round((totalPts / nextTh) * 100)));
        const progressText = (level >= 8)
          ? `MAX (Level 8)`
          : `${formatNum(totalPts)} / ${formatNum(nextTh)} points`;

        const btnText = (level >= 8)
          ? `MAX LEVEL • Lv 8`
          : `UPGRADE • Lv ${level} → ${level+1} • ${formatNum(cost)} GOLD`;

        const card = document.createElement("div");
        card.className = `card ${rarityCls}`;

        card.innerHTML = `
          <div class="cardTop">
            <div class="letter">${b.id}</div>
            <div class="rarityTag">${b.rarity}</div>
          </div>

          <div class="name">${unlocked ? b.name : "Locked"}</div>

          <div class="rows">
            <div class="kvRow">
              <span>Level</span>
              <b>${level}${level >= 8 ? " (MAX)" : ""}</b>
            </div>

            <div class="kvRow">
              <span>Progress</span>
              <b>${progressText}</b>
            </div>

            <div class="barWrap"><div class="bar" style="width:${unlocked ? pct : 0}%"></div></div>

            <button class="upgradeBtn ${eligible ? "ready" : ""}" ${eligible ? "" : "disabled"} data-badge="${b.id}">
              ${btnText}
            </button>

            <div class="kvRow" style="opacity:.9;">
              <span>Status</span>
              <b>${
                !unlocked ? "Locked" :
                level >= 8 ? "Overflow → Gems" :
                eligible ? "Ready!" :
                (eligibleByPoints ? "Need Gold" : "Need Points")
              }</b>
            </div>
          </div>

          ${unlocked ? "" : `
            <div class="lockedOverlay">
              <div>
                <div class="lockTitle">Locked</div>
                <div class="lockSub">Reach the required rank to view</div>
              </div>
            </div>
          `}
        `;

        const btn = card.querySelector("button.upgradeBtn");
        if (btn && unlocked && level < 8){
          btn.addEventListener("click", async (e) => {
            e.stopPropagation();
            const uid = auth.currentUser?.uid;
            if (!uid) return showToast("Not signed in.");
            await upgradeBadge(uid, b.id, b.rarity);
          });
        }

        badgeGrid.appendChild(card);
      });
    }

    let unsubRewards = null;

    onAuthStateChanged(auth, async (user) => {
      if (!user) { window.location.href = "/"; return; }

      const infoRef = doc(db, "accountInfo", user.uid);
      const infoSnap = await getDoc(infoRef);

      if (!infoSnap.exists()) { window.location.href = "/under-review/"; return; }

      const info = infoSnap.data() || {};
      const role = info.authRole;

      if (role !== "admin" && role !== "viewer") {
        window.location.href = "/under-review/";
        return;
      }

      authInfoEl.textContent = `Signed in as ${user.email || "—"}`;
      roleBadgeContainer.innerHTML = `
        <span class="badgeTag ${role === "admin" ? "admin" : ""}">
          ${role === "admin" ? "Admin" : "Viewer"}
        </span>
      `;

      if (unsubRewards) unsubRewards();

      unsubRewards = onSnapshot(rewardsRef(user.uid), (snap) => {
        const d = snap.exists() ? (snap.data() || {}) : {};

        goldValue.textContent = formatNum(d.gold ?? 0);
        gemsValue.textContent = formatNum(d.gems ?? 0);

        const rank = d.rank ?? "No Rank";
        rankValue.textContent = rank;
        rankPillText.textContent = rank;

        const unlockedSet = unlockedByRank(rank);
        unlockedNote.textContent = `Unlocked: ${unlockedSet.size} / 25 (based on Rank)`;

        renderBadges(d, unlockedSet);
      }, (err) => {
        console.warn("Rewards snapshot error:", err);
        showToast("Could not load rewards data.");
      });
    });
  </script>
</body>
</html>
